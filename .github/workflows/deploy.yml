name: Deploy Portfolio to Nekoweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build

      - name: Deploy to Nekoweb
        uses: indiefellas/deploy2nekoweb@v1.0.1
        with:
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
          nekoweb-domain: 'heiwamakina.nekoweb.org'
          nekoweb-username: 'heiwamakina'
          directory: 'heiwamakina.nekoweb.org'
        #   folder: 'dist'
        #   cleanup: true
